@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');

/* CSS Variables for Premium Adaptive Theme */
:root {
	--bg-gradient: linear-gradient(135deg, #050a14 0%, #0c1627 100%);
	--card-bg: rgba(16, 28, 48, 0.45);
	--card-border: rgba(255, 255, 255, 0.05);
	--card-hover-border: rgba(43, 123, 196, 0.35);
	--text-primary: #f1f5f9;
	--text-secondary: #94a3b8;
	
	--accent-primary: #2b7bc4; /* Reef Blue Light */
	--accent-secondary: #749bc2; /* Slate Blue Light */
	--accent-gradient: linear-gradient(135deg, #2b7bc4 0%, #749bc2 100%);
	
	--text-link: #38bdf8;
	--text-link-hover: #749bc2;
	--font-family: 'Inter', -apple-system, sans-serif;
	--font-family-header: 'Outfit', -apple-system, sans-serif;
	--font-family-monospace: Consolas, Menlo, Monaco, monospace;
	--shadow-glow: 0 0 30px rgba(43, 123, 196, 0.15);
	--container-width: 52rem;
	
	--syntax-tab-size: 2;
}

@media (prefers-color-scheme: light) {
	:root {
		--bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
		--card-bg: rgba(255, 255, 255, 0.7);
		--card-border: rgba(15, 23, 42, 0.06);
		--card-hover-border: rgba(10, 71, 125, 0.3);
		--text-primary: #0f172a;
		--text-secondary: #334155;
		
		--accent-primary: #0a477d; /* Reef Blue */
		--accent-secondary: #35516d; /* Slate Blue */
		--accent-gradient: linear-gradient(135deg, #0a477d 0%, #35516d 100%);
		
		--text-link: #0284c7;
		--text-link-hover: #0a477d;
		--shadow-glow: 0 10px 30px rgba(10, 71, 125, 0.08);
	}
}

/* Base resets & layouts */
* {
	box-sizing: border-box;
}

@view-transition {
	navigation: auto;
}

html {
	overflow-y: scroll;
	scroll-behavior: smooth;
}

html,
body {
	padding: 0;
	margin: 0;
	font-family: var(--font-family);
	color: var(--text-primary);
	background: var(--bg-gradient);
	background-attachment: fixed;
	min-height: 100vh;
	line-height: 1.6;
}

body {
	max-width: var(--container-width);
	margin: 0 auto;
	padding: 0 1.5rem;
	position: relative;
}

/* Ambient glow blobs in the background */
body::before {
	content: "";
	position: fixed;
	top: -10%;
	left: -10%;
	width: 50vw;
	height: 50vw;
	background: radial-gradient(circle, rgba(43, 123, 196, 0.06) 0%, rgba(0,0,0,0) 70%);
	z-index: -1;
	pointer-events: none;
	border-radius: 50%;
}

body::after {
	content: "";
	position: fixed;
	bottom: -10%;
	right: -10%;
	width: 60vw;
	height: 60vw;
	background: radial-gradient(circle, rgba(116, 155, 194, 0.06) 0%, rgba(0,0,0,0) 70%);
	z-index: -1;
	pointer-events: none;
	border-radius: 50%;
}

/* A11y skip link */
.visually-hidden:not(:focus):not(:active) {
	clip: rect(0 0 0 0);
	clip-path: inset(50%);
	height: 1px;
	overflow: hidden;
	position: absolute;
	white-space: nowrap;
	width: 1px;
}

#skip-link {
	text-decoration: none;
	background: var(--card-bg);
	border: 1px solid var(--card-border);
	backdrop-filter: blur(10px);
	color: var(--text-primary);
	padding: 0.6rem 1.2rem;
	border-radius: 8px;
	font-weight: 500;
}

#skip-link.visually-hidden:focus {
	position: absolute;
	top: 1rem;
	left: 1rem;
	z-index: 999;
}

/* Fluid media */
img {
	max-width: 100%;
	border-radius: 12px;
	box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
img[width][height] {
	height: auto;
}
img[src$=".svg"] {
	width: 100%;
	height: auto;
	max-width: none;
}
video,
iframe {
	width: 100%;
	height: auto;
	border-radius: 12px;
	box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
iframe {
	aspect-ratio: 16/9;
}

/* Typography styles */
h1, h2, h3, h4, h5, h6 {
	font-family: var(--font-family-header);
	color: var(--accent-primary);
	font-weight: 700;
	letter-spacing: -0.02em;
	margin-top: 2.5rem;
	margin-bottom: 1.25rem;
	line-height: 1.25;
}

h1 {
	font-size: 2.8rem;
	font-weight: 800;
	background: var(--accent-gradient);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
	margin-top: 1.5rem;
	margin-bottom: 2rem;
}

h2 {
	font-size: 2rem;
	border-bottom: 1px solid var(--card-border);
	padding-bottom: 0.5rem;
	margin-top: 3rem;
}

h3 {
	font-size: 1.5rem;
}

p {
	margin-top: 0;
	margin-bottom: 1.25rem;
}
p:last-child {
	margin-bottom: 0;
}

li {
	margin-bottom: 0.5rem;
}

a {
	color: var(--text-link);
	text-decoration: none;
	transition: color 0.2s ease, text-shadow 0.2s ease;
}

a:hover {
	color: var(--text-link-hover);
}

main,
footer {
	padding: 1.5rem 0;
}

main :first-child {
	margin-top: 0;
}

/* Header style - Glassmorphic */
header {
	display: flex;
	gap: 1.5rem;
	flex-wrap: wrap;
	justify-content: space-between;
	align-items: center;
	padding: 1.25rem 2rem;
	margin-top: 1.5rem;
	margin-bottom: 2.5rem;
	background: var(--card-bg);
	border: 1px solid var(--card-border);
	backdrop-filter: blur(16px);
	-webkit-backdrop-filter: blur(16px);
	border-radius: 16px;
	box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
	position: sticky;
	top: 1rem;
	z-index: 100;
}

.home-link {
	font-family: var(--font-family-header);
	font-size: 1.6rem;
	font-weight: 800;
	letter-spacing: -0.04em;
	background: var(--accent-gradient);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
	text-decoration: none;
	transition: opacity 0.3s ease;
}

.home-link:hover {
	opacity: 0.85;
}

/* Main Navigation */
.nav {
	display: flex;
	gap: 1.5rem;
	padding: 0;
	margin: 0;
	list-style: none;
	align-items: center;
}

.nav-item a {
	font-family: var(--font-family-header);
	font-weight: 550;
	font-size: 0.98rem;
	color: var(--text-primary);
	text-decoration: none;
	position: relative;
	padding: 0.25rem 0;
	transition: color 0.3s ease;
}

.nav-item a:hover {
	color: var(--accent-primary);
}

.nav-item a::after {
	content: "";
	position: absolute;
	bottom: 0;
	left: 0;
	width: 100%;
	height: 2px;
	background: var(--accent-gradient);
	transform: scaleX(0);
	transform-origin: right;
	transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.nav-item a:hover::after,
.nav-item a[aria-current="page"]::after {
	transform: scaleX(1);
	transform-origin: left;
}

.nav-item a[aria-current="page"] {
	color: var(--accent-primary);
}

/* Post lists (Cards layout) */
.postlist {
	counter-reset: start-from var(--postlist-index);
	list-style: none;
	padding: 0;
	margin: 2.5rem 0;
	display: flex;
	flex-direction: column;
	gap: 1.5rem;
}

.postlist-item {
	position: relative;
	display: flex;
	flex-direction: column;
	align-items: flex-start;
	gap: 0.6rem;
	counter-increment: start-from -1;
	padding: 1.5rem 1.75rem 1.5rem 4rem;
	background: var(--card-bg);
	border: 1px solid var(--card-border);
	border-radius: 16px;
	transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), 
	            border-color 0.3s ease, 
	            box-shadow 0.3s ease;
	backdrop-filter: blur(12px);
	-webkit-backdrop-filter: blur(12px);
}

.postlist-item:hover {
	transform: translateY(-5px);
	border-color: var(--card-hover-border);
	box-shadow: var(--shadow-glow);
}

/* Custom styled numeric list counters */
.postlist-item::before {
	position: absolute;
	left: 1.5rem;
	top: 1.5rem;
	font-family: var(--font-family-header);
	font-weight: 800;
	font-size: 1.15rem;
	content: counter(start-from, decimal-leading-zero);
	background: var(--accent-gradient);
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
	opacity: 0.8;
}

.postlist-link {
	font-family: var(--font-family-header);
	font-size: 1.35rem;
	font-weight: 700;
	color: var(--text-primary);
	text-decoration: none;
	line-height: 1.35;
	transition: color 0.2s ease;
}

.postlist-link:hover {
	color: var(--accent-primary);
}

.postlist-date {
	font-size: 0.85rem;
	color: var(--text-secondary);
	font-weight: 500;
	letter-spacing: 0.02em;
}

/* Post Details & Tags */
.post-metadata {
	display: inline-flex;
	flex-wrap: wrap;
	gap: 0.75rem;
	list-style: none;
	padding: 0;
	margin: 0.5rem 0 2rem 0;
	align-items: center;
}

.post-metadata time {
	color: var(--text-secondary);
	font-size: 0.9rem;
	margin-right: 0.5rem;
}

.post-tag {
	display: inline-flex;
	align-items: center;
	justify-content: center;
	padding: 0.3rem 0.8rem;
	font-size: 0.78rem;
	font-weight: 650;
	text-transform: uppercase;
	letter-spacing: 0.06em;
	border-radius: 30px;
	background: rgba(43, 123, 196, 0.08);
	border: 1px solid rgba(43, 123, 196, 0.15);
	color: var(--accent-primary);
	text-decoration: none;
	transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.post-tag:hover {
	background: var(--accent-gradient);
	color: #ffffff !important;
	border-color: transparent;
	box-shadow: 0 0 15px rgba(43, 123, 196, 0.35);
	transform: translateY(-2px);
}

/* Tables styling */
table {
	width: 100%;
	margin: 2rem 0;
	border-collapse: collapse;
}

table th,
table td {
	padding: 0.8rem 1rem;
	text-align: left;
	border-bottom: 1px solid var(--card-border);
}

table th {
	font-family: var(--font-family-header);
	font-weight: 600;
	color: var(--text-primary);
}

/* Code & Syntax Highlighting Overrides */
pre,
code {
	font-family: var(--font-family-monospace);
	font-size: 0.92rem;
}

pre {
	margin: 2rem 0;
	padding: 1.25rem 1.5rem;
	background: rgba(10, 10, 18, 0.9) !important;
	border: 1px solid var(--card-border);
	border-radius: 14px;
	overflow-x: auto;
	box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
}

code:not(pre code) {
	background: rgba(43, 123, 196, 0.08);
	border: 1px solid rgba(43, 123, 196, 0.15);
	color: var(--accent-primary);
	padding: 0.2rem 0.45rem;
	border-radius: 6px;
	font-size: 0.9em;
}

/* Prev/Next Navigation Links */
.links-nextprev {
	display: flex;
	justify-content: space-between;
	gap: 1rem;
	list-style: none;
	padding: 1.5rem 0;
	margin-top: 3rem;
	border-top: 1px solid var(--card-border);
}

.links-nextprev > * {
	flex-grow: 1;
}

.links-nextprev-next {
	text-align: right;
}

.links-nextprev a {
	display: inline-block;
	padding: 0.75rem 1.25rem;
	background: var(--card-bg);
	border: 1px solid var(--card-border);
	border-radius: 12px;
	font-weight: 500;
	transition: all 0.3s ease;
}

.links-nextprev a:hover {
	border-color: var(--accent-primary);
	color: var(--accent-primary);
	box-shadow: 0 0 15px rgba(43, 123, 196, 0.1);
	transform: translateY(-2px);
}

/* Footer Styling */
footer {
	margin-top: 5rem;
	border-top: 1px solid var(--card-border);
	padding: 2.5rem 0;
	text-align: center;
	font-size: 0.9rem;
	color: var(--text-secondary);
}

footer p {
	margin: 0;
}</style>
